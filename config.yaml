data:
  raw_dir: data/raw/

labeling:
  horizon_hours: 12

features:
  window_hours: [3, 12, 24]
  top_n_features: 20

model:
  n_cv_folds: 5
  tuning:
    n_trials: 50
    optimize_metric: auc_pr
    search_space:
      n_estimators: [100, 500]
      max_depth: [3, 8]
      learning_rate: [0.01, 0.3]
      subsample: [0.6, 1.0]
      colsample_bytree: [0.6, 1.0]

evaluation:
  test_size_pct: 0.20
  threshold_range: [0.1, 0.9]
  threshold_step: 0.05

outputs:
  models_dir: outputs/models/
  reports_dir: outputs/reports/
